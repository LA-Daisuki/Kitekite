  let currentLanguage = "en";
  const languageToggle = document.getElementById("languageToggle");

  function setLanguage(language) {
    currentLanguage = language;
    document.documentElement.lang = language;

    document.querySelectorAll("[data-i18n]").forEach((element) => {
      const key = element.getAttribute("data-i18n");

      if (translations[language][key] !== undefined) {
        element.innerHTML = translations[language][key];
      }
    });

    const contactSocialLinks = document.getElementById("contactSocialLinks");

    if (contactSocialLinks) {
      if (language === "ja") {
        contactSocialLinks.classList.add("is-hidden");
      } else {
        contactSocialLinks.classList.remove("is-hidden");
      }
    }

    languageToggle.textContent = translations[language].toggleButton;
  }

  languageToggle.addEventListener("click", () => {
    const nextLanguage = currentLanguage === "en" ? "ja" : "en";
    setLanguage(nextLanguage);
  });

  setLanguage("en");
