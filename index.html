<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ドジャーズブルーヘブン — ロサンゼルス ルームレンタル</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+JP:wght@300;400;500;700&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #21262d;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #1565c0;
      --accent-light: #1e88e5;
      --accent-warm: #e65100;
      --accent-gold: #f9a825;
      --dodger-blue: #005a9c;
      --dodger-red: #ef3e42;
      --radius: 12px;
      --font-en: 'Inter', system-ui, sans-serif;
      --font-jp: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-jp);
    }

    /* Layout Styles */
    .container {
      width: 90%;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* Typography */
    h1,
    h2,
    h3 {
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 0.5em;
    }

    h1 {
      font-size: 2.5rem;
    }

    h2 {
      font-size: 2rem;
    }

    h3 {
      font-size: 1.5rem;
    }

    p {
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 1em;
      color: var(--text-muted);
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    /* Component Styles - Example (Customize as needed) */
    .card {
      background-color: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
  </style>
</head>

<body>
  <div class="container">
    <header>
      <h1>ドジャーズブルーヘブン</h1>
      <p>ロサンゼルスでの快適なルームレンタル</p>
    </header>

    <main>
      <section class="card">
        <h2>物件概要</h2>
        <p>詳細な物件情報がここに表示されます。</p>
      </section>

      <section class="card">
        <h2>料金</h2>
        <p>レンタル料金に関する情報。</p>
      </section>

      <section class="card">
        <h2>お問い合わせ</h2>
        <p>ご質問やご予約はこちらから。</p>
      </section>
    </main>

    <footer>
      <p>&copy; 2024 ドジャーズブルーヘブン</p>
    </footer>
  </div>
</body>

</html>
